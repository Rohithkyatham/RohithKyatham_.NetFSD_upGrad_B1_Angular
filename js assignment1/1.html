<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Page</title>
<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background-color:lightblue;
    font-size:18px;
}

nav{
    display:flex;
    justify-content:space-around;
    background-color:darkblue;
    padding:15px;
}

nav a{
    color:white;
    text-decoration:none;
    padding:8px;
}

.container{
    padding:20px;
}

@media (max-width:600px){
    body{
        background-color:lightgreen;
        font-size:14px;
    }

    nav{
        flex-direction:column;
        align-items:center;
    }

    nav a{
        display:block;
        padding:10px;
    }
}
</style>
</head>
<body>

<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Services</a>
<a href="#">Contact</a>
</nav>

<div class="container">
<h1>Responsive Webpage</h1>
<p>This page changes layout and style based on screen size.</p>
</div>

</body>
</html>
