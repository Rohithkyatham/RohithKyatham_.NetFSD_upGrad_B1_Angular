<!DOCTYPE html>
<html>
<head>
    <title>Number Analysis Tool</title>
</head>
<body>

<script>

let number = 7;

let result = (number >= 0) ? "Positive" : "Negative";
console.log("Number: " + number);
console.log("Positive/Negative: " + result);

if (number % 2 === 0) {
    console.log("Even or Odd: Even");
} 
else {
    console.log("Even or Odd: Odd");
}

console.log("Numbers from 1 to " + number + ":");

for (let i = 1; i <= number; i++) {
    console.log(i);
}

</script>

</body>
</html>
