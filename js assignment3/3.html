<!DOCTYPE html>
<html>
<head>
    <title>Location Logger</title>
</head>
<body onload="loadHistory()">

    <h2>Location-Based Logger</h2>

    <button onclick="getLocation()">Get My Location</button>

    <p id="output"></p>

    <h3>Last 5 Locations</h3>
    <ul id="history"></ul>

    <script>
        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(showPosition, showError);
            } else {
                document.getElementById("output").innerHTML = "Geolocation not supported";
            }
        }

        function showPosition(position) {
            var lat = position.coords.latitude;
            var lon = position.coords.longitude;

            document.getElementById("output").innerHTML =
                "Latitude: " + lat + "<br>Longitude: " + lon;

            var locations = JSON.parse(localStorage.getItem("locations")) || [];

            locations.unshift({ latitude: lat, longitude: lon });

            if (locations.length > 5) {
                locations = locations.slice(0, 5);
            }

            localStorage.setItem("locations", JSON.stringify(locations));
            displayHistory(locations);
        }

        function showError(error) {
            if (error.code === 1) {
                document.getElementById("output").innerHTML = "Permission denied";
            } else if (error.code === 2) {
                document.getElementById("output").innerHTML = "Location unavailable";
            } else if (error.code === 3) {
                document.getElementById("output").innerHTML = "Timeout";
            } else {
                document.getElementById("output").innerHTML = "Unknown error";
            }
        }

        function loadHistory() {
            var locations = JSON.parse(localStorage.getItem("locations")) || [];
            displayHistory(locations);
        }

        function displayHistory(locations) {
            var list = document.getElementById("history");
            list.innerHTML = "";

            for (var i = 0; i < locations.length; i++) {
                var item = document.createElement("li");
                item.innerHTML = "Lat: " + locations[i].latitude + 
                                 ", Lon: " + locations[i].longitude;
                list.appendChild(item);
            }
        }
    </script>

</body>
</html>
